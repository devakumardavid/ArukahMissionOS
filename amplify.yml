version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm install -g pnpm@11.0.7
            - rm -rf node_modules apps/*/node_modules packages/*/node_modules
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm --filter @arukah/web build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - apps/web/.next/cache/**/*
