name: Flatten repository structure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flatten:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Move project to repository root
        shell: bash
        run: |
          set -e
          shopt -s dotglob nullglob
          for item in ArukahMissionOS-GitHub-Upload/*; do
            mv "$item" .
          done
          rmdir ArukahMissionOS-GitHub-Upload
          rm -f .github/workflows/flatten.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move project files to repository root"
          git push
